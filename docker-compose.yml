version: '3.8'

services:
  # Database Service
  db:
    image: postgres:15-alpine
    container_name: fellow4u_db
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: P@ssword
      POSTGRES_DB: fellow4u
    ports:
      - "5432:5432"
    volumes:
      # Tự động chạy file init.sql khi khởi tạo DB lần đầu
      - ./database:/docker-entrypoint-initdb.d
      - postgres_data:/var/lib/postgresql/data

  # Backend Service (Node.js)
  backend:
    build: ./backend
    container_name: fellow4u_api
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgres://admin:P@ssword@db:5432/fellow4u
    depends_on:
      - db

volumes:
  postgres_data: